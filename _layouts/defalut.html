<!DOCTYPE html>
<html lang="it" data-theme="auto">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        {% if page.title %}
            {{ page.title }} · {{ site.title }}
        {% else %}
            {{ site.title }}
        {% endif %}
    </title>

    <meta name="description"
          content="{{ site.description }}">

    <link rel="stylesheet"
          href="{{ '/assets/css/main.css' | relative_url }}">

    <link rel="icon"
          href="{{ '/assets/images/logo.png' | relative_url }}">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    {% include navbar.html %}

    <main>

        {{ content }}

    </main>

    {% include footer.html %}

    <script src="{{ '/assets/js/theme.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/menu.js' | relative_url }}"></script>

</body>

</html>
