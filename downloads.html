<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Snode – Download</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

  <style>
    /* ===== PALETTE DAL LOGO ===== */
    :root {
      --ciano: #00eaff;
      --viola: #7b2cff;
      --blu: #1a1aff;

      --bg: #0a0c10;
      --bg-light: #11141a;
      --text: #f0f0f0;
      --text-muted: #bfc4ce;
      --accent: var(--ciano);
      --accent2: var(--viola);
      --accent3: var(--blu);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ===== NAVBAR ===== */
    header {
      background: var(--bg-light);
      border-bottom: 1px solid #1f2229;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .nav {
      max-width: 1200px;
      margin: auto;
      padding: 0.8rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }

    .logo {
      height: 38px;
      width: 38px;
      object-fit: contain;
    }

    .brand-title {
      font-size: 1.2rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--ciano), var(--viola));
      -webkit-background-clip: text;
      color: transparent;
    }

    .nav-links {
      display: flex;
      gap: 1.4rem;
      align-items: center;
    }

    .nav-links a {
      color: var(--text-muted);
      font-weight: 500;
    }

    .nav-links a:hover {
      color: var(--text);
    }

    .github-btn {
      padding: 0.45rem 0.9rem;
      border-radius: 6px;
      background: var(--accent3);
      color: white;
      font-weight: 600;
    }

    /* ===== HAMBURGER ===== */
    .nav-toggle {
      display: none;
      flex-direction: column;
      gap: 4px;
      cursor: pointer;
    }

    .nav-toggle span {
      width: 24px;
      height: 3px;
      background: var(--text);
    }

    @media (max-width: 780px) {
      .nav-links {
        display: none;
        position: absolute;
        top: 60px;
        left: 0;
        right: 0;
        background: var(--bg-light);
        flex-direction: column;
        padding: 1rem 1.5rem;
        border-bottom: 1px solid #1f2229;
      }

      .nav-links.open {
        display: flex;
      }

      .nav-toggle {
        display: flex;
      }
    }

    /* ===== HERO (DOWNLOAD) ===== */
    .hero {
      max-width: 900px;
      margin: auto;
      padding: 3rem 1.5rem;
      text-align: center;
    }

    .hero-title {
      font-size: 2.6rem;
      font-weight: 800;
      margin-bottom: 1rem;
    }

    .hero-title span {
      background: linear-gradient(90deg, var(--ciano), var(--viola));
      -webkit-background-clip: text;
      color: transparent;
    }

    .hero-sub {
      font-size: 1.1rem;
      color: var(--text-muted);
      margin-bottom: 2rem;
    }

    /* ===== CUSTOM SELECT (NODE.JS STYLE) ===== */
    .download-box {
      max-width: 600px;
      margin: auto;
      background: var(--bg-light);
      border: 1px solid #1f2229;
      padding: 1.5rem;
      border-radius: 10px;
      text-align: left;
    }

    .select-wrapper {
      position: relative;
      margin-top: 1rem;
    }

    .select-display {
      background: #0d1117;
      border: 1px solid #30363d;
      padding: 0.9rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1rem;
    }

    .select-display:hover {
      border-color: var(--accent);
    }

    .select-arrow {
      transition: 0.2s;
    }

    .select-arrow.open {
      transform: rotate(180deg);
    }

    .select-menu {
      position: absolute;
      top: 110%;
      left: 0;
      right: 0;
      background: var(--bg-light);
      border: 1px solid #1f2229;
      border-radius: 8px;
      overflow: hidden;
      display: none;
      z-index: 20;
    }

    .select-menu.open {
      display: block;
    }

    .select-option {
      padding: 0.9rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      border-bottom: 1px solid #1a1d24;
    }

    .select-option:last-child {
      border-bottom: none;
    }

    .select-option:hover {
      background: #0d1117;
    }

    .badge {
      padding: 0.25rem 0.6rem;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 700;
    }

    .badge-current { background: var(--accent3); color: white; }
    .badge-lts { background: var(--accent2); color: white; }
    .badge-eol { background: #b30000; color: white; }

    .btn-download {
      background: var(--accent);
      color: #000;
      padding: 0.8rem 1.6rem;
      border-radius: 6px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      margin-top: 1.5rem;
      width: 100%;
    }

    .btn-download:hover {
      background: var(--viola);
      color: white;
    }

    /* ===== FOOTER ===== */
    footer {
      text-align: center;
      padding: 1.5rem;
      color: var(--text-muted);
      border-top: 1px solid #1f2229;
      background: #050608;
      margin-top: 2rem;
    }
  </style>
</head>

<body>

  <!-- ===== NAVBAR ===== -->
  <header>
    <div class="nav">
      <div class="nav-left">
        <img src="logo.png" class="logo" alt="Snode Logo">
        <div class="brand-title">Snode</div>
      </div>

      <div class="nav-toggle" id="navToggle">
        <span></span><span></span><span></span>
      </div>

      <nav class="nav-links" id="navLinks">
        <a href="/docs/"><i class="fa-solid fa-book"></i> Documentazione</a>
        <a href="/downloads"><i class="fa-solid fa-download"></i> Download</a>
        <a href="https://github.com/snodeproject" target="_blank" class="github-btn"><i class="fa-brands fa-github"></i> GitHub</a>
      </nav>
    </div>
  </header>

  <!-- ===== HERO ===== -->
  <section class="hero">
    <h1 class="hero-title">Scarica <span>Snode</span></h1>
    <p class="hero-sub">Seleziona la versione dal menu personalizzato.</p>
  </section>

  <!-- ===== DOWNLOAD BOX ===== -->
  <section class="download-box">

    <h3>Versione</h3>

    <div class="select-wrapper">

      <div class="select-display" id="selectDisplay">
        <span id="selectedText">0.1.0</span>
        <i class="fa-solid fa-chevron-down select-arrow" id="selectArrow"></i>
      </div>

      <div class="select-menu" id="selectMenu">

        <div class="select-option" data-version="0.1.0">
          <span>0.1.0</span>
          <span class="badge badge-current">CURRENT</span>
        </div>

        <div class="select-option" data-version="0.0.5">
          <span>0.0.5</span>
          <span class="badge badge-lts">LTS</span>
        </div>

        <div class="select-option" data-version="0.0.1">
          <span>0.0.1</span>
          <span class="badge badge-eol">EOL</span>
        </div>

      </div>
    </div>

    <button class="btn-download" id="downloadBtn">
      <i class="fa-solid fa-download"></i> Scarica 0.1.0
    </button>

  </section>

  <footer>
    © <span id="year"></span> Snode Project — Open source
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    const navToggle = document.getElementById("navToggle");
    const navLinks = document.getElementById("navLinks");

    navToggle.addEventListener("click", () => {
      navLinks.classList.toggle("open");
    });

    /* ===== CUSTOM SELECT ===== */
    const selectDisplay = document.getElementById("selectDisplay");
    const selectMenu = document.getElementById("selectMenu");
    const selectArrow = document.getElementById("selectArrow");
    const selectedText = document.getElementById("selectedText");
    const downloadBtn = document.getElementById("downloadBtn");

    let currentVersion = "0.1.0";

    selectDisplay.addEventListener("click", () => {
      selectMenu.classList.toggle("open");
      selectArrow.classList.toggle("open");
    });

    document.querySelectorAll(".select-option").forEach(option => {
      option.addEventListener("click", () => {
        currentVersion = option.dataset.version;
        selectedText.textContent = currentVersion;
        downloadBtn.innerHTML = `<i class="fa-solid fa-download"></i> Scarica ${currentVersion}`;
        downloadBtn.onclick = () => window.location.href = `/zips/${currentVersion}.zip`;

        selectMenu.classList.remove("open");
        selectArrow.classList.remove("open");
      });
    });

    downloadBtn.onclick = () => window.location.href = `/zips/${currentVersion}.zip`;
  </script>

</body>
</html>
